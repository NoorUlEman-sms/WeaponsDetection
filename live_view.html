<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Vision AI - Model Comparison Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #060b14;
            color: #e2e8f0;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #0f1a2e 0%, #0d1520 100%);
            border-bottom: 1px solid #1e3a5f;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6);
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .logo { font-size: 1.6rem; font-weight: 900; letter-spacing: 2px;
                background: linear-gradient(90deg, #38bdf8, #818cf8);
                -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 0.75rem; color: #64748b; letter-spacing: 1px; text-transform: uppercase; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .badge-live {
            display: flex; align-items: center; gap: 6px;
            background: rgba(239,68,68,0.15); border: 1px solid #dc2626;
            padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; color: #f87171;
            animation: pulse-border 2s infinite;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
        @keyframes pulse-border { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3)} 50%{box-shadow:0 0 0 6px rgba(239,68,68,0)} }

        .cam-info { font-size: 0.78rem; color: #94a3b8; }
        .cam-info span { color: #38bdf8; font-weight: 600; }

        /* ── GRID ── */
        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 14px;
        }

        .model-panel {
            background: #0d1520;
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .model-panel:hover {
            border-color: #38bdf8;
            box-shadow: 0 0 20px rgba(56,189,248,0.1);
        }

        .panel-header {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid #1e3a5f;
        }
        .model-name { font-weight: 700; font-size: 1rem; }
        .m1 .model-name { color: #facc15; }
        .m2 .model-name { color: #4ade80; }
        .m3 .model-name { color: #f87171; }

        .model-version { font-size: 0.7rem; color: #475569; background: rgba(255,255,255,0.05);
                         padding: 2px 8px; border-radius: 10px; }

        .stream-box {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 240px;
            overflow: hidden;
        }
        .stream-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .panel-footer {
            padding: 6px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            font-size: 0.72rem;
            color: #475569;
        }
        .update-time { color: #38bdf8; }

        /* ── FOOTER ── */
        .footer {
            background: #0a0f1a;
            border-top: 1px solid #1e3a5f;
            padding: 10px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.72rem;
            color: #334155;
        }
        .footer-note { color: #475569; }
        .footer-note span { color: #38bdf8; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div>
                <div class="logo">🔫 SMS Vision AI</div>
                <div class="subtitle">Multi-Model Weapon Detection</div>
            </div>
        </div>
        <div class="header-right">
            <div class="cam-info">Camera: <span>13 — 192.168.51.238</span></div>
            <div class="badge-live"><div class="dot"></div> LIVE</div>
        </div>
    </div>

    <div class="grid-container">

        <!-- Model: best.pt -->
        <div class="model-panel m1">
            <div class="panel-header">
                <div>
                    <div class="model-name">best.pt</div>
                </div>
                <div class="model-version">Base Model</div>
            </div>
            <div class="stream-box">
                <img id="img-best" src="live_view_best.jpg" alt="best.pt stream">
            </div>
            <div class="panel-footer">
                <span>Conf ≥ 0.25</span>
                <span class="update-time" id="t-best">Loading...</span>
            </div>
        </div>

        <!-- Model: best (1).pt -->
        <div class="model-panel m2">
            <div class="panel-header">
                <div>
                    <div class="model-name">best (1).pt</div>
                </div>
                <div class="model-version">v1 Model</div>
            </div>
            <div class="stream-box">
                <img id="img-best1" src="live_view_best1.jpg" alt="best(1).pt stream">
            </div>
            <div class="panel-footer">
                <span>Conf ≥ 0.25</span>
                <span class="update-time" id="t-best1">Loading...</span>
            </div>
        </div>

        <!-- Model: best (6).pt -->
        <div class="model-panel m3">
            <div class="panel-header">
                <div>
                    <div class="model-name">best (6).pt</div>
                </div>
                <div class="model-version">v6 Model</div>
            </div>
            <div class="stream-box">
                <img id="img-best6" src="live_view_best6.jpg" alt="best(6).pt stream">
            </div>
            <div class="panel-footer">
                <span>Conf ≥ 0.25</span>
                <span class="update-time" id="t-best6">Loading...</span>
            </div>
        </div>

    </div>

    <div class="footer">
        <div class="footer-note">Camera 13: <span>rtsp://192.168.51.238</span> · All models running in parallel.</div>
        <div id="global-time">—</div>
    </div>

    <script>
        const feeds = [
            { img: document.getElementById('img-best'),  time: document.getElementById('t-best'),  src: 'live_view_best.jpg' },
            { img: document.getElementById('img-best1'), time: document.getElementById('t-best1'), src: 'live_view_best1.jpg' },
            { img: document.getElementById('img-best6'), time: document.getElementById('t-best6'), src: 'live_view_best6.jpg' },
        ];
        const globalTime = document.getElementById('global-time');

        setInterval(() => {
            const t = new Date().getTime();
            const ts = new Date().toLocaleTimeString();
            feeds.forEach(f => {
                f.img.src = f.src + '?t=' + t;
                f.time.innerText = ts;
            });
            globalTime.innerText = ts;
        }, 150);
    </script>

</body>
</html>
